services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diginode
      POSTGRES_PASSWORD: diginode
      POSTGRES_DB: diginode
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diginode"]
      interval: 5s
      timeout: 5s
      retries: 5

  diginode-cc:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://diginode:diginode@postgres:5432/diginode?sslmode=disable
      LISTEN_ADDR: ":3000"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      AUTH_LOCKOUT_THRESHOLD: ${AUTH_LOCKOUT_THRESHOLD:-4}
      AUTH_LOCKOUT_DURATION_MINUTES: ${AUTH_LOCKOUT_DURATION_MINUTES:-15}
      INVITE_EXPIRY_HOURS: ${INVITE_EXPIRY_HOURS:-168}
      PASSWORD_RESET_EXPIRY_HOURS: ${PASSWORD_RESET_EXPIRY_HOURS:-1}
      TWO_FACTOR_ISSUER: ${TWO_FACTOR_ISSUER:-DigiNode CC}
      AUTH_MIN_SUBMIT_MS: ${AUTH_MIN_SUBMIT_MS:-600}
      RATE_LIMIT_DEFAULT_LIMIT: ${RATE_LIMIT_DEFAULT_LIMIT:-300}
      RATE_LIMIT_DEFAULT_TTL: ${RATE_LIMIT_DEFAULT_TTL:-60}
      RATE_LIMIT_LOGIN_LIMIT: ${RATE_LIMIT_LOGIN_LIMIT:-30}
      RATE_LIMIT_LOGIN_TTL: ${RATE_LIMIT_LOGIN_TTL:-60}
      RATE_LIMIT_2FA_LIMIT: ${RATE_LIMIT_2FA_LIMIT:-10}
      RATE_LIMIT_2FA_TTL: ${RATE_LIMIT_2FA_TTL:-300}
      WS_MAX_CLIENTS: ${WS_MAX_CLIENTS:-200}
      SERIAL_DEVICE: ${SERIAL_DEVICE:-}
      SERIAL_BAUD: ${SERIAL_BAUD:-115200}
      SERIAL_RECONNECT_BASE_MS: ${SERIAL_RECONNECT_BASE_MS:-500}
      SERIAL_RECONNECT_MAX_MS: ${SERIAL_RECONNECT_MAX_MS:-15000}
      SERIAL_RECONNECT_JITTER: ${SERIAL_RECONNECT_JITTER:-0.2}
      JAWG_ACCESS_TOKEN: ${JAWG_ACCESS_TOKEN:-}
      MQTT_ENABLED: ${MQTT_ENABLED:-false}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://localhost:1883}
      MQTT_CONNECT_TIMEOUT_MS: ${MQTT_CONNECT_TIMEOUT_MS:-5000}
      ADSB_ENABLED: ${ADSB_ENABLED:-false}
      ADSB_URL: ${ADSB_URL:-http://localhost:8080/data/aircraft.json}
      ADSB_POLL_INTERVAL_MS: ${ADSB_POLL_INTERVAL_MS:-3000}
      ADSB_OPENSKY_ENABLED: ${ADSB_OPENSKY_ENABLED:-false}
      ADSB_OPENSKY_CLIENT_ID: ${ADSB_OPENSKY_CLIENT_ID:-}
      ADSB_OPENSKY_CLIENT_SECRET: ${ADSB_OPENSKY_CLIENT_SECRET:-}
      ADSB_PLANESPOTTERS_ENABLED: ${ADSB_PLANESPOTTERS_ENABLED:-true}
      ACARS_ENABLED: ${ACARS_ENABLED:-false}
      ACARS_UDP_HOST: ${ACARS_UDP_HOST:-0.0.0.0}
      ACARS_PORT: ${ACARS_PORT:-5555}
      TAK_ENABLED: ${TAK_ENABLED:-false}
      TAK_ADDR: ${TAK_ADDR:-}
      TAK_PROTOCOL: ${TAK_PROTOCOL:-tcp}
      TAK_TLS: ${TAK_TLS:-false}
      TAK_USERNAME: ${TAK_USERNAME:-}
      TAK_PASSWORD: ${TAK_PASSWORD:-}
      FAA_ONLINE_LOOKUP_ENABLED: ${FAA_ONLINE_LOOKUP_ENABLED:-true}
      FAA_ONLINE_CACHE_TTL_MINUTES: ${FAA_ONLINE_CACHE_TTL_MINUTES:-10}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      AUTO_UPDATE_BRANCH: ${AUTO_UPDATE_BRANCH:-master}
      AUTO_UPDATE_REMOTE: ${AUTO_UPDATE_REMOTE:-origin}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH:-}
    ports:
      - "3000:3000"
    privileged: true
    volumes:
      - /dev:/dev
      - tiles:/app/data/tiles

volumes:
  pgdata:
  tiles:
